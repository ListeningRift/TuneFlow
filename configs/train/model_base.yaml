model:
  model_type: tuneflow_decoder
  architecture_hint: qwen2-style

  # Dynamic vocab sync: when tokenizer vocab changes, model config follows automatically.
  vocab_path: data/tokenized/tokenizer_vocab.json
  sync_vocab_with_file: true
  sync_special_tokens_with_file: true
  strict_vocab_file: true

  # Fallback values (will be overwritten by vocab sync when vocab_path exists)
  vocab_size: 243
  bos_token_id: 0
  eos_token_id: 1
  pad_token_id: null

  # v0 baseline (~50M)
  hidden_size: 768
  intermediate_size: 2048
  num_hidden_layers: 8
  num_attention_heads: 12
  num_key_value_heads: 4
  hidden_act: silu

  # sequence and positional encoding
  max_position_embeddings: 1024
  rope_theta: 10000.0

  initializer_range: 0.02
  rms_norm_eps: 0.000001
  attention_dropout: 0.05
  use_cache: true
  tie_word_embeddings: false

  use_sliding_window: false
  sliding_window: 512
  max_window_layers: 0
