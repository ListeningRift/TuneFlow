train:
  model_config: configs/train/model_base.yaml
  train_idx: data/tokenized/train.idx.json
  train_bin: null
  valid_idx: data/tokenized/valid.idx.json
  valid_bin: null
  resume_from: null

  device: auto
  precision: auto
  seed: 42

  # 640 token exploratory run for checking whether longer local context
  # helps phrase-level completion without immediately jumping to 768.
  steps: 5000
  batch_size: 1
  grad_accum_steps: 8
  seq_len: 640
  lr: 0.00015
  weight_decay: 0.01
  grad_clip: 1.0
  fim_ratio: 0.35
  fim_min_span: 20
  fim_max_span: 160
  bos_sample_ratio: 0.05
  eos_sample_ratio: 0.45
  fim_eos_ratio: 1.0

  scheduler: cosine
  warmup_steps: 200
  min_lr_scale: 0.1

  log_every: 50
  eval_every: 250
  eval_batches: 10
  save_every: 250
  save_best: true
  no_restore_rng: false

  output_dir: outputs/checkpoints/base_small_seq640
  metrics_path: null
