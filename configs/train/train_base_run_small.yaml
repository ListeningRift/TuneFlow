train:
  # 模型与数据路径
  model_config: configs/train/model_base.yaml
  train_idx: data/tokenized/train.idx.json
  train_bin: null
  valid_idx: data/tokenized/valid.idx.json
  valid_bin: null
  resume_from: null

  # 运行环境
  device: auto
  precision: auto
  seed: 42

  # 优化配置
  # small 档位：明显大于冒烟规模，但仍适合快速观察训练趋势和早期评估反馈。
  steps: 5000
  batch_size: 2
  grad_accum_steps: 1
  seq_len: 256
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  # NEXT + FIM 混合训练：续写为主任务，FIM 为辅助任务。
  fim_ratio: 0.15
  fim_min_span: 8
  fim_max_span: 64
  bos_sample_ratio: 0.1
  eos_sample_ratio: 0.1
  fim_eos_ratio: 1.0

  # 学习率调度
  scheduler: cosine
  warmup_steps: 200
  min_lr_scale: 0.1

  # 日志 / 评估 / 保存
  log_every: 20
  eval_every: 250
  eval_batches: 10
  save_every: 250
  save_best: true
  no_restore_rng: false

  # 输出路径
  output_dir: outputs/checkpoints/base/train_base_run_small
  metrics_path: null
