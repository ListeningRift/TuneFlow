train:
  # Model/data paths
  model_config: configs/train/model_base.yaml
  train_idx: data/tokenized/train.idx.json
  train_bin: null
  valid_idx: data/tokenized/valid.idx.json
  valid_bin: null
  resume_from: null

  # Runtime
  device: auto
  precision: auto
  seed: 42

  # Optimization
  steps: 200
  batch_size: 2
  grad_accum_steps: 1
  seq_len: 256
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  # NEXT + FIM 混合训练：续写为主，FIM 为辅
  fim_ratio: 0.15
  fim_min_span: 8
  fim_max_span: 64

  # Scheduler
  scheduler: cosine
  warmup_steps: 20
  min_lr_scale: 0.1

  # Logging / eval / saving
  log_every: 10
  eval_every: 50
  eval_batches: 5
  save_every: 100
  save_best: true
  no_restore_rng: false

  # Outputs
  output_dir: outputs/checkpoints/base/train_base_run
  metrics_path: null
